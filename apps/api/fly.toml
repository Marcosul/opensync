app = "opensync-api"
primary_region = "gru"

[build]
  # Inclui packages/sync (workspace:* não funciona só com apps/api no contexto).
  context = "../.."
  dockerfile = "Dockerfile"

[deploy]
  # Migrações usam DIRECT_URL (5432). DATABASE_URL pode ser pooler Supabase (6543) — ver apps/api/prisma/schema.prisma
  release_command = "npx prisma migrate deploy"

[env]
  NODE_ENV = "production"
  PORT = "3001"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  # Evita 502 no primeiro pedido (cold start) quando o Next chama o Nest no onboarding.
  min_machines_running = 1
  processes = ["app"]
