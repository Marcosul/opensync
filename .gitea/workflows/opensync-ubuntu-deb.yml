name: opensync-ubuntu package

on:
  push:
    tags:
      - "opensync-ubuntu-v*"
  workflow_dispatch:

jobs:
  deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm --filter @opensync/opensync-ubuntu exec tsc
      - name: Package .deb
        run: bash apps/opensync-ubuntu/packaging/build-deb.sh "${GITHUB_REF_NAME#opensync-ubuntu-v}"
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opensync-ubuntu-deb
          path: |
            apps/opensync-ubuntu/packaging/*.deb
            apps/opensync-ubuntu/packaging/*.sha256
